name: ghost_box
description: Kawaii horror AR camera game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  google_fonts: ^6.2.1
  # Vendored + patched fork (namespace/AGP8 + null-safety fixes) so it builds
  # on Flutter 3.41 / Android. See third_party/arcore_flutter_plugin.
  arcore_flutter_plugin:
    path: third_party/arcore_flutter_plugin
  # 3D vectors/quaternions used by ARCore poses (Vector3 / Vector4).
  vector_math: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
