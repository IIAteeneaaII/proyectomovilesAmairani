org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Jetifier rewrites the legacy com.android.support libraries that the old
# Sceneform 1.13 (pulled in by arcore_flutter_plugin) drags in, so they no
# longer collide with AndroidX (fixes duplicate-class on android.support.v4.*).
android.enableJetifier=true
